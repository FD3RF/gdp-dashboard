version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_USER: quant_user
      POSTGRES_PASSWORD: quant_password
      POSTGRES_DB: quant_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: quant_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # If no GPU, remove the deploy section above

  # AI Quant Trading System
  quant_system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_system
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - QUANT__DATABASE__HOST=postgres
      - QUANT__DATABASE__PORT=5432
      - QUANT__DATABASE__USER=quant_user
      - QUANT__DATABASE__PASSWORD=quant_password
      - QUANT__DATABASE__NAME=quant_system
      - QUANT__REDIS__HOST=redis
      - QUANT__REDIS__PORT=6379
      - QUANT__OLLAMA__HOST=ollama
      - QUANT__OLLAMA__PORT=11434
      - QUANT__ENVIRONMENT=production
    ports:
      - "8000:8000"   # Dashboard API
      - "9090:9090"   # Metrics
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: quant_network
